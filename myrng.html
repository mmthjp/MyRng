<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سياراتي</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Myrng">
<meta name="theme-color" content="#17122b">
<style>
@import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#17122B;
  --surface:#211A3D;
  --surface-2:#2B2350;
  --border:#3A2F5C;
  --text:#F2EFFA;
  --muted:#9C93BE;
  --accent:#E63946;
  --accent-dim:#E6394633;
  --amber:#E8A33D;
  --amber-dim:#E8A33D33;
  --green:#4FBE8A;
  --red:#E4614F;
}
[data-theme="light"]{
  --bg:#F6F4FB;
  --surface:#FFFFFF;
  --surface-2:#F1EEF9;
  --border:#E2DCF0;
  --text:#201A33;
  --muted:#6E6690;
  --accent:#D6303F;
  --accent-dim:#D6303F1f;
  --amber:#B9740A;
  --amber-dim:#B9740A22;
  --green:#1F9D6E;
  --red:#C8443A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* Header */
.header{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
.header h1{
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:20px;
  letter-spacing:.2px;
}
.header p{
  color:var(--muted);
  font-size:13px;
  margin-top:2px;
}

/* Car switcher */
.car-switcher{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:10px;
  align-items:center;
}
.car-switcher .car-select-wrap{flex:1;}
.add-car-btn{
  flex:0 0 auto;
  width:48px;height:48px;
  border-radius:14px;
  background:var(--accent-dim);
  border:1px solid var(--accent);
  color:var(--accent);
  font-size:22px;
  font-weight:700;
  cursor:pointer;
}
.car-select-wrap{position:relative;}
.car-select{
  width:100%;
  appearance:none;
  -webkit-appearance:none;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14.5px;
  padding:14px 44px 14px 16px;
  border-radius:14px;
  cursor:pointer;
}
.car-select:focus{outline:none;border-color:var(--accent);}
.car-select-wrap::after{
  content:'';
  position:absolute;
  left:18px;top:50%;
  width:8px;height:8px;
  border-right:2px solid var(--muted);
  border-bottom:2px solid var(--muted);
  transform:translateY(-70%) rotate(45deg);
  pointer-events:none;
}

/* Content */
.content{
  flex:1;
  padding:18px;
  padding-bottom:90px;
  overflow-y:auto;
}
.section{display:none;}
.section.active{display:block;}

/* Car detail card */
.car-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
}
.car-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.car-card-top .icon{
  width:46px;height:46px;
  border-radius:12px;
  background:var(--accent-dim);
  display:flex;align-items:center;justify-content:center;
}
.car-card h2{
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:19px;
  margin-top:14px;
}
.car-card .sub{
  color:var(--muted);
  font-size:13px;
  margin-top:2px;
}
.odometer{
  margin-top:18px;
  background:var(--surface-2);
  border-radius:12px;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.odometer .label{font-size:12px;color:var(--muted);}
.odometer .value{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:22px;
  letter-spacing:1px;
  color:var(--accent);
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}
.info-item{
  background:var(--surface-2);
  border-radius:12px;
  padding:12px 14px;
}
.info-item .k{font-size:11.5px;color:var(--muted);}
.info-item .v{
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14.5px;
  margin-top:3px;
}

/* Maintenance list */
.mt-summary{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}
.mt-summary .box{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  text-align:center;
}
.mt-summary .num{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:20px;
}
.mt-summary .num.ok{color:var(--green);}
.mt-summary .num.warn{color:var(--amber);}
.mt-summary .num.due{color:var(--red);}
.mt-summary .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.part-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}
.part-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}
.chevron{color:var(--muted);transition:transform .2s ease;flex:0 0 auto;}
.part-card.expanded .chevron{transform:rotate(180deg);}
.part-name-wrap{display:flex;align-items:center;gap:10px;}
.part-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;
}
.part-name{font-family:'Almarai',sans-serif;font-weight:700;font-size:14.5px;}
.part-ref{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--muted);
  margin-top:2px;
  letter-spacing:.3px;
}
.part-status{
  font-size:11px;
  font-weight:700;
  padding:4px 9px;
  border-radius:999px;
}
.part-status.ok{background:#4FBE8A22;color:var(--green);}
.part-status.warn{background:#E8A33D22;color:var(--amber);}
.part-status.due{background:#E4614F22;color:var(--red);}

.gauge{margin-top:14px;}
.reminder-btn{
  width:100%;
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--muted);
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:12.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
}
.reminder-btn:active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
.part-details{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.part-card.expanded .part-details{max-height:260px;}
.gauge-track{
  position:relative;
  height:8px;
  border-radius:99px;
  background:var(--surface-2);
  overflow:hidden;
}
.gauge-fill{
  position:absolute;
  top:0;right:0;
  height:100%;
  border-radius:99px;
}
.gauge-ticks{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
.gauge-ticks span{
  width:1px;height:4px;
  background:var(--border);
}
.part-meta{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
  font-size:11.5px;
  color:var(--muted);
}
.part-meta .meta-row{display:flex;justify-content:space-between;}
.part-meta b{color:var(--text);font-weight:600;}
.icon-btn{
  width:30px;height:30px;
  border-radius:9px;
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
}
.icon-btn.danger:active{background:#E4614F22;color:var(--red);border-color:#E4614F55;}
.icon-btn:active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
.btn-row{display:flex;gap:10px;margin-top:4px;}
.btn-row .confirm-btn{width:auto;flex:1;margin-top:0;}
.btn-secondary{background:var(--surface-2)!important;color:var(--text)!important;}

/* Add part */
.add-part-btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1.5px dashed var(--border);
  background:transparent;
  color:var(--accent);
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  margin-bottom:14px;
}
.add-part-btn:active{background:var(--accent-dim);}
.add-panel{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  margin-bottom:14px;
}
.add-panel.open{max-height:900px;}
.empty-state{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:36px 20px;
  text-align:center;
  margin-bottom:14px;
}
.empty-state .empty-icon{
  width:56px;height:56px;
  border-radius:16px;
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.empty-state p{color:var(--muted);font-size:13.5px;margin-bottom:16px;}
.add-panel-inner{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}
.mode-toggle{display:flex;gap:8px;margin-bottom:14px;}
.mode-btn{
  flex:1;
  padding:9px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--muted);
  font-size:12.5px;
  font-weight:700;
  font-family:'Tajawal',sans-serif;
  cursor:pointer;
}
.mode-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.field-label{font-size:11.5px;color:var(--muted);margin-bottom:6px;display:block;}
.field-group{margin-bottom:12px;}
.field-input, .field-select{
  width:100%;
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  font-size:13.5px;
  padding:10px 12px;
  border-radius:10px;
}
.field-input:focus, .field-select:focus{outline:none;border-color:var(--accent);}
.field-row{display:flex;gap:10px;}
.field-row .field-group{flex:1;}
.confirm-btn{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--accent);
  color:#FFFFFF;
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  margin-top:4px;
}
.form-hint{font-size:11px;color:var(--muted);margin-top:8px;}

/* Bottom nav */
.bottom-nav{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 0;
  color:var(--muted);
  cursor:pointer;
  border-radius:12px;
  transition:.15s ease;
}
.nav-btn.active{color:var(--accent);background:var(--accent-dim);}
.nav-btn span{font-size:12px;font-weight:700;font-family:'Tajawal',sans-serif;}

/* Auth */
.logout-btn{
  flex:0 0 auto;
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-family:'Tajawal',sans-serif;
  font-size:12.5px;
  font-weight:700;
  cursor:pointer;
}
.theme-toggle-btn{
  flex:0 0 auto;
  width:36px;height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.auth-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:28px 22px;
  position:relative;
}
.auth-title{
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:24px;
  text-align:center;
  margin-bottom:4px;
}
.auth-sub{
  color:var(--muted);
  font-size:13px;
  text-align:center;
  margin-bottom:26px;
}
.auth-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
}
.auth-error{
  background:#E4614F1a;
  border:1px solid #E4614F55;
  color:var(--red);
  font-size:12.5px;
  padding:10px 12px;
  border-radius:10px;
  margin-bottom:14px;
}

/* Undo bar */
.undo-bar{
  position:fixed;
  bottom:82px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 36px);
  max-width:444px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  display:none;
  z-index:50;
  box-shadow:0 8px 24px #0008;
}
.undo-bar.show{display:block;}
.undo-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  font-size:12.5px;
  color:var(--text);
}
.undo-row button{
  background:none;border:none;
  color:var(--accent);
  font-weight:800;
  font-family:'Almarai',sans-serif;
  font-size:12.5px;
  cursor:pointer;
}
.undo-track{height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.undo-fill{height:100%;background:var(--accent);width:100%;}
</style>

function svgIcon(name, color){
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[name]||icons.drop}</svg>`;
}

let currentTheme = 'dark';

function applyTheme(){
  document.documentElement.setAttribute('data-theme', currentTheme==='light' ? 'light' : '');
  const iconName = currentTheme==='light' ? 'moon' : 'sun';
  const iconColor = currentTheme==='light' ? '#6E6690' : '#9C93BE';
  const svg = svgIcon(iconName, iconColor);
  const btn1 = document.getElementById('themeToggleBtn');
  const btn2 = document.getElementById('themeToggleBtnAuth');
  if(btn1) btn1.innerHTML = svg;
  if(btn2) btn2.innerHTML = svg;
  try{ localStorage.setItem('car_app_theme', currentTheme); }catch(e){}
}

function toggleTheme(){
  currentTheme = currentTheme==='light' ? 'dark' : 'light';
  applyTheme();
}

function initTheme(){
  try{
    const saved = localStorage.getItem('car_app_theme');
    if(saved==='light' || saved==='dark') currentTheme = saved;
  }catch(e){}
  applyTheme();
}

function daysBetween(d1,d2){ return Math.round((d2-d1)/(1000*60*60*24)); }

function computePercent(part, car){
  const last = new Date(part.lastDate);
  const now = new Date(TODAY);
  let pctKm = null, pctTime = null;
  if(part.lifeKm){
    const usedKm = car.mileage - part.lastMileage;
    pctKm = Math.min(100, Math.max(0,(usedKm/part.lifeKm)*100));
  }
  if(part.lifeMonths){
    const usedDays = daysBetween(last, now);
    const lifeDays = part.lifeMonths*30;
    pctTime = Math.min(100, Math.max(0,(usedDays/lifeDays)*100));
  }
  return Math.round(Math.max(pctKm||0, pctTime||0));
}

function statusFromPct(pct){
  if(pct>=100) return {cls:'due', label:'مستحقة'};
  if(pct>=75) return {cls:'warn', label:'قربت'};
  return {cls:'ok', label:'سليمة'};
}

function fmt(n){ return n.toLocaleString('en-US'); }

function toEnglishDigits(str){
  const ar = '٠١٢٣٤٥٦٧٨٩';
  return str.replace(/[٠-٩]/g, d => ar.indexOf(d)).replace(/[^0-9]/g,'');
}

async function submitAuth(){
  const phone = auth.phone;
  const pin = auth.password;

  if(phone.length!==10 || !phone.startsWith('05')){
    auth.error = 'اسم المستخدم لازم يكون رقم جوال 10 أرقام ويبدأ بـ 05';
    renderAuthScreen(); return;
  }
  if(pin.length!==5){
    auth.error = 'الرمز لازم يكون 5 أرقام بالضبط';
    renderAuthScreen(); return;
  }
  if(auth.mode==='signup' && pin!==auth.confirmPassword){
    auth.error = 'تأكيد الرمز مو مطابق';
    renderAuthScreen(); return;
  }

  auth.error = '';
  auth.loading = true;
  renderAuthScreen();

  const hash = await hashPin(pin);
  let user, error;

  if(auth.mode==='signup'){
    const res = await sb.from('users').insert({phone, pin_hash:hash}).select().single();
    user = res.data; error = res.error;
    if(error){
      auth.loading = false;
      auth.error = error.code==='23505' ? 'اسم المستخدم مسجل من قبل، سجل دخول بدل ما تنشئ حساب' : ('خطأ: ' + error.message);
      renderAuthScreen();
      return;
    }
  } else {
    const res = await sb.from('users').select('*').eq('phone', phone).eq('pin_hash', hash).single();
    user = res.data; error = res.error;
    if(error || !user){
      auth.loading = false;
      auth.error = 'اسم المستخدم أو الرمز غير صحيح';
      renderAuthScreen();
      return;
    }
  }

  currentUser = user;
  auth = {mode:'login', phone:'', password:'', confirmPassword:'', error:'', loading:false};
  try{ localStorage.setItem('myrng_user', JSON.stringify({id:user.id, phone:user.phone})); }catch(e){}

  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  await loadCarsFromDB();
}

function logout(){
  currentUser = null;
  cars = [];
  activeCarId = null;
  try{ localStorage.removeItem('myrng_user'); }catch(e){}
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('authScreen').style.display = 'block';
  renderAuthScreen();
}

async function loadCarsFromDB(){
  const { data, error } = await sb.from('cars').select('*, parts(*)').eq('user_id', currentUser.id).order('created_at', {ascending:true});
  if(error){
    console.error('تعذر تحميل السيارات', error);
    cars = [];
  } else {
    cars = (data||[]).map(row => ({
      id: row.id,
      name: row.name,
      plate: row.plate,
      color: row.color,
      vin: row.vin,
      mileage: row.mileage || 0,
      purchaseDate: row.purchase_date,
      condition: row.condition,
      parts: (row.parts||[]).map(p => ({
        id: p.id,
        name: p.name,
        ref: p.ref,
        icon: p.icon,
        periodic: p.periodic,
        lastDate: p.last_date,
        lastMileage: p.last_mileage,
        lifeKm: p.life_km,
        lifeMonths: p.life_months,
        cost: p.cost
      }))
    }));
  }
  activeCarId = cars.length ? cars[0].id : null;
  renderSwitcher();
  renderCarSection();
  renderMaintenanceSection();
}

      <div class="add-panel-inner">
        <div class="mode-toggle">
          <button class="mode-btn ${addPart.mode==='catalog'?'active':''}" onclick="setAddMode('catalog')">من القائمة</button>
          <button class="mode-btn ${addPart.mode==='custom'?'active':''}" onclick="setAddMode('custom')">يدوي</button>
          <button class="mode-btn ${addPart.mode==='periodic'?'active':''}" onclick="setAddMode('periodic')">صيانة دورية</button>
        </div>
        ${addPart.mode==='periodic' ? `
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">آخر صيانة (كم)</label>
            <input class="field-input" type="number" value="${addPart.pLastKm}" oninput="updatePeriodicLast('pLastKm', this.value)">
          </div>
          <div class="field-group">
            <label class="field-label">آخر صيانة (تاريخ)</label>
            <input class="field-input" type="date" value="${addPart.pLastDate}" oninput="updatePeriodicLast('pLastDate', this.value)">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">الصيانة القادمة (كم)</label>
            <input class="field-input" type="number" value="${addPart.pNextKm}" oninput="updatePeriodicNext('pNextKm', this.value)">
          </div>
          <div class="field-group">
            <label class="field-label">الصيانة القادمة (تاريخ)</label>
            <input class="field-input" type="date" value="${addPart.pNextDate}" oninput="updatePeriodicNext('pNextDate', this.value)">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">تكلفة الصيانة الدورية (ريال)</label>
          <input class="field-input" type="number" value="${addPart.cost}" oninput="updateAddField('cost', this.value)" placeholder="اختياري">
        </div>
        <button class="confirm-btn" onclick="confirmAddPart()">إضافة للسجل</button>
        <div class="form-hint">الاقتراح الافتراضي 6 أشهر أو 10,000 كم من آخر صيانة، وتقدر تعدله زي ما تبي</div>
        ` : `
        ${addPart.mode==='catalog' ? `
        <div class="field-group">
          <label class="field-label">اختر القطعة</label>
          <select class="field-select" onchange="onCatalogChange(this.value)">${catalogOptions}</select>
        </div>` : `
        <div class="field-group">
          <label class="field-label">اسم القطعة</label>
          <input class="field-input" type="text" value="${addPart.name}" oninput="updateAddField('name', this.value)" placeholder="مثال: مقص أمامي يمين">
        </div>`}
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">العمر بالكيلومتر</label>
            <input class="field-input" type="number" value="${addPart.km}" oninput="updateAddField('km', this.value)" placeholder="مثال: 20000">
          </div>
          <div class="field-group">
            <label class="field-label">العمر بالأشهر</label>
            <input class="field-input" type="number" value="${addPart.months}" oninput="updateAddField('months', this.value)" placeholder="مثال: 12">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">سعر القطعة (ريال)</label>
          <input class="field-input" type="number" value="${addPart.cost}" oninput="updateAddField('cost', this.value)" placeholder="اختياري">
        </div>
        <button class="confirm-btn" onclick="confirmAddPart()">إضافة للسجل</button>
        <div class="form-hint">تعبئة خانة وحدة تكفي، ونقطة البداية هي عداد السيارة الحالي وتاريخ اليوم.</div>
        `}
      </div>
    </div>`;
}

function addMonthsToDate(dateStr, months){
  const d = new Date(dateStr);
  if(isNaN(d)) return '';
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}

function toggleAddPanel(){
  addPart.open = !addPart.open;
  if(addPart.open){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    const car = cars.find(c=>c.id===activeCarId);
    addPart.mode='catalog'; addPart.name=''; addPart.km=cat.lifeKm||''; addPart.months=cat.lifeMonths||'';
    addPart.pLastDate = TODAY;
    addPart.pLastKm = car ? car.mileage : '';
    addPart.pNextKm = addPart.pLastKm ? Number(addPart.pLastKm)+10000 : '';
    addPart.pNextDate = addMonthsToDate(TODAY, 6);
  }
  renderMaintenanceSection();
}

function setAddMode(mode){
  addPart.mode = mode;
  if(mode==='catalog'){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    addPart.km = cat.lifeKm||''; addPart.months = cat.lifeMonths||'';
  } else if(mode==='custom'){
    addPart.km=''; addPart.months='';
  }
  renderMaintenanceSection();
}

function onCatalogChange(id){
  addPart.catalogId = id;
  const cat = partsCatalog.find(c=>c.id===id);
  addPart.km = cat.lifeKm||''; addPart.months = cat.lifeMonths||'';
  renderMaintenanceSection();
}

function updateAddField(field, value){
  addPart[field] = value;
}

function updatePeriodicLast(field, value){
  addPart[field] = value;
  if(field==='pLastKm' && value){
    addPart.pNextKm = Number(value)+10000;
  }
  if(field==='pLastDate' && value){
    addPart.pNextDate = addMonthsToDate(value, 6);
  }
  renderMaintenanceSection();
}

function updatePeriodicNext(field, value){
  addPart[field] = value;
}

async function confirmAddPart(){
  const car = cars.find(c=>c.id===activeCarId);

  if(addPart.mode==='periodic'){
    if(!addPart.pLastDate || !addPart.pLastKm || !addPart.pNextDate || !addPart.pNextKm){
      alert('عبّي كل الحقول: آخر صيانة والصيانة القادمة (كم وتاريخ)');
      return;
    }
    const lastDate = new Date(addPart.pLastDate);
    const nextDate = new Date(addPart.pNextDate);
    if(isNaN(lastDate) || isNaN(nextDate) || nextDate<=lastDate){
      alert('تاريخ الصيانة القادمة لازم يكون بعد تاريخ آخر صيانة');
      return;
    }
    const lifeKm = Math.max(1, Number(addPart.pNextKm) - Number(addPart.pLastKm));
    const lifeMonths = Math.max(1, Math.round((nextDate-lastDate)/(1000*60*60*24*30)));
    const ref = 'PERIODIC-'+Date.now().toString().slice(-5);
    const cost = Number(addPart.cost)||null;
    const { data, error } = await sb.from('parts').insert({
      car_id: car.id, name:'الصيانة الدورية', ref, icon:'service', periodic:true,
      last_date:addPart.pLastDate, last_mileage:Number(addPart.pLastKm),
      life_km:lifeKm, life_months:lifeMonths, cost
    }).select().single();
    if(error){ alert('تعذرت إضافة الصيانة الدورية: ' + error.message); return; }
    car.parts.push({id:data.id, name:data.name, ref:data.ref, icon:data.icon, periodic:data.periodic, lastDate:data.last_date, lastMileage:data.last_mileage, lifeKm:data.life_km, lifeMonths:data.life_months, cost:data.cost});
    addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:'', cost:'', pLastKm:'', pLastDate:'', pNextKm:'', pNextDate:''};
    renderCarSection();
    renderMaintenanceSection();
    return;
  }

  const lifeKm = Number(addPart.km)||null;
  const lifeMonths = Number(addPart.months)||null;
  if(!lifeKm && !lifeMonths){ alert('لازم تدخل مدة بالكيلومتر أو بالأشهر على الأقل'); return; }

  let name, icon, ref;
  if(addPart.mode==='catalog'){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    name = cat.name; icon = cat.icon;
    ref = cat.id.toUpperCase()+'-'+Date.now().toString().slice(-4);
  } else {
    name = addPart.name.trim();
    if(!name){ alert('لازم تكتب اسم القطعة'); return; }
    icon = 'custom';
    ref = 'CUST-'+Date.now().toString().slice(-5);
  }

  const { data, error } = await sb.from('parts').insert({
    car_id: car.id, name, ref, icon, periodic:false,
    last_date:TODAY, last_mileage:car.mileage, life_km:lifeKm, life_months:lifeMonths, cost:Number(addPart.cost)||null
  }).select().single();
  if(error){ alert('تعذرت إضافة القطعة: ' + error.message); return; }
  car.parts.push({id:data.id, name:data.name, ref:data.ref, icon:data.icon, periodic:data.periodic, lastDate:data.last_date, lastMileage:data.last_mileage, lifeKm:data.life_km, lifeMonths:data.life_months, cost:data.cost});
  addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:'', cost:'', pLastKm:'', pLastDate:'', pNextKm:'', pNextDate:''};
  renderMaintenanceSection();
}

function togglePart(id){
  if(expandedParts.has(id)) expandedParts.delete(id); else expandedParts.add(id);
  renderMaintenanceSection();
}

function computeNextDate(p){
  const last = new Date(p.lastDate);
  let months = p.lifeMonths;
  if(!months && p.lifeKm){
    months = Math.max(1, Math.round(p.lifeKm/1500)); // تقدير تقريبي: ~1500كم بالشهر
  }
  if(!months) months = 6;
  const next = new Date(last);
  next.setMonth(next.getMonth()+months);
  return next.toISOString().slice(0,10);
}

function icsDate(dateStr){
  const d = new Date(dateStr);
  const p = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}`;
}

function addDaysISO(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

function sendReminder(id){
  const car = cars.find(c=>c.id===activeCarId);
  const p = car.parts.find(p=>p.id===id);
  if(!p) return;

  const nextDate = computeNextDate(p);
  const dtStart = icsDate(nextDate);
  const dtEnd = icsDate(addDaysISO(nextDate, 1));
  const title = (p.periodic ? 'الصيانة الدورية' : p.name) + ' - ' + car.name;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Myrng//AR',
    'CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    'UID:myrng-'+p.id+'@myrng.app',
    'DTSTAMP:'+icsDate(TODAY)+'T000000Z',
    'DTSTART;VALUE=DATE:'+dtStart,
    'DTEND;VALUE=DATE:'+dtEnd,
    'SUMMARY:'+title,
    'DESCRIPTION:تذكير صيانة من تطبيق سياراتي',
    'BEGIN:VALARM',
    'TRIGGER:-P1D',
    'ACTION:DISPLAY',
    'DESCRIPTION:تذكير صيانة',
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (p.periodic ? 'الصيانة-الدورية' : p.name) + '.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}

function openEditPart(id){
  const car = cars.find(c=>c.id===activeCarId);
  const p = car.parts.find(p=>p.id===id);
  if(!p) return;
  editingPartId = id;
  editForm = {name:p.name, lastDate:p.lastDate, nextDate:computeNextDate(p)};
  renderMaintenanceSection();
}

function closeEditPart(){
  editingPartId = null;
  renderMaintenanceSection();
}

function updateEditField(field, value){
  editForm[field] = value;
}

async function saveEditPart(){
  const car = cars.find(c=>c.id===activeCarId);
  const p = car.parts.find(p=>p.id===editingPartId);
  if(!p) return;
  if(!editForm.name.trim()){ alert('لازم اسم القطعة'); return; }
  const last = new Date(editForm.lastDate);
  const next = new Date(editForm.nextDate);
  if(isNaN(last) || isNaN(next) || next<=last){
    alert('تاريخ الصيانة القادمة لازم يكون بعد تاريخ آخر صيانة');
    return;
  }
  const months = Math.max(1, Math.round((next-last)/(1000*60*60*24*30)));
  const newName = editForm.name.trim();
  const newLastDate = editForm.lastDate;

  const { error } = await sb.from('parts').update({
    name:newName, last_date:newLastDate, life_months:months, life_km:null
  }).eq('id', p.id);
  if(error){ alert('تعذر حفظ التعديل: ' + error.message); return; }

  p.name = newName;
  p.lastDate = newLastDate;
  p.lifeMonths = months;
  p.lifeKm = null;
  editingPartId = null;
  renderMaintenanceSection();
}

function deletePart(id, evt){
  if(evt) evt.stopPropagation();
  const car = cars.find(c=>c.id===activeCarId);
  const idx = car.parts.findIndex(p=>p.id===id);
  if(idx===-1) return;

  if(pendingDelete){ clearTimeout(pendingDelete.timeoutId); finalizeDelete(); }

  const [removed] = car.parts.splice(idx,1);
  if(editingPartId===id) editingPartId=null;
  expandedParts.delete(id);
  pendingDelete = {carId:car.id, part:removed, index:idx};
  renderMaintenanceSection();
  showUndoBar(removed.name);
  pendingDelete.timeoutId = setTimeout(()=>{ finalizeDelete(); }, 15000);
}

async function finalizeDelete(){
  if(!pendingDelete) return;
  const { part } = pendingDelete;
  pendingDelete = null;
  hideUndoBar();
  const { error } = await sb.from('parts').delete().eq('id', part.id);
  if(error) console.error('تعذر حذف القطعة نهائيًا', error);
}

function undoDeletePart(){
  if(!pendingDelete) return;
  clearTimeout(pendingDelete.timeoutId);
  const car = cars.find(c=>c.id===pendingDelete.carId);
  if(car){
    const idx = Math.min(pendingDelete.index, car.parts.length);
    car.parts.splice(idx,0,pendingDelete.part);
  }
  pendingDelete = null;
  hideUndoBar();
  renderMaintenanceSection();
}

function showUndoBar(name){
  const bar = document.getElementById('undoBar');
  bar.innerHTML = `
    <div class="undo-row">
      <span>تم حذف "${name}"</span>
      <button onclick="undoDeletePart()">تراجع</button>
    </div>
    <div class="undo-track"><div class="undo-fill" id="undoFill"></div></div>`;
  bar.classList.add('show');
  const fill = document.getElementById('undoFill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      fill.style.transition = 'width 15s linear';
      fill.style.width = '0%';
    });
  });
}

function hideUndoBar(){
  const bar = document.getElementById('undoBar');
  bar.classList.remove('show');
  bar.innerHTML = '';
}

function selectCar(id){
  activeCarId = id;
  expandedParts = new Set();
  addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:'', cost:'', pLastKm:'', pLastDate:'', pNextKm:'', pNextDate:''};
  editingPartId = null;
  addCar.open = false;
  renderSwitcher();
  renderCarSection();
  renderMaintenanceSection();
}

function selectTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('section-car').classList.toggle('active', tab==='car');
  document.getElementById('section-maintenance').classList.toggle('active', tab==='maintenance');
}

document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click', ()=>selectTab(b.dataset.tab));
});

(async function initApp(){
  initTheme();
  let saved = null;
  try{ saved = JSON.parse(localStorage.getItem('myrng_user')||'null'); }catch(e){}
  if(saved && saved.id){
    currentUser = saved;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    await loadCarsFromDB();
    applyTheme();
  } else {
    renderAuthScreen();
  }
})();
</script>
</body>
