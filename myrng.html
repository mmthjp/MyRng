<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سياراتي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#14171C;
  --surface:#1D2129;
  --surface-2:#262B35;
  --border:#2E3440;
  --text:#ECEEF1;
  --muted:#8B93A1;
  --amber:#E8A33D;
  --amber-dim:#E8A33D33;
  --green:#4FBE8A;
  --red:#E4614F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* Header */
.header{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
}
.header h1{
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:20px;
  letter-spacing:.2px;
}
.header p{
  color:var(--muted);
  font-size:13px;
  margin-top:2px;
}

/* Car switcher */
.car-switcher{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}
.car-select-wrap{position:relative;}
.car-select{
  width:100%;
  appearance:none;
  -webkit-appearance:none;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14.5px;
  padding:14px 44px 14px 16px;
  border-radius:14px;
  cursor:pointer;
}
.car-select:focus{outline:none;border-color:var(--amber);}
.car-select-wrap::after{
  content:'';
  position:absolute;
  left:18px;top:50%;
  width:8px;height:8px;
  border-right:2px solid var(--muted);
  border-bottom:2px solid var(--muted);
  transform:translateY(-70%) rotate(45deg);
  pointer-events:none;
}

/* Content */
.content{
  flex:1;
  padding:18px;
  padding-bottom:90px;
  overflow-y:auto;
}
.section{display:none;}
.section.active{display:block;}

/* Car detail card */
.car-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
}
.car-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.car-card-top .icon{
  width:46px;height:46px;
  border-radius:12px;
  background:var(--amber-dim);
  display:flex;align-items:center;justify-content:center;
}
.car-card h2{
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:19px;
  margin-top:14px;
}
.car-card .sub{
  color:var(--muted);
  font-size:13px;
  margin-top:2px;
}
.odometer{
  margin-top:18px;
  background:var(--surface-2);
  border-radius:12px;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.odometer .label{font-size:12px;color:var(--muted);}
.odometer .value{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:22px;
  letter-spacing:1px;
  color:var(--amber);
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}
.info-item{
  background:var(--surface-2);
  border-radius:12px;
  padding:12px 14px;
}
.info-item .k{font-size:11.5px;color:var(--muted);}
.info-item .v{
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14.5px;
  margin-top:3px;
}

/* Maintenance list */
.mt-summary{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}
.mt-summary .box{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  text-align:center;
}
.mt-summary .num{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:20px;
}
.mt-summary .num.ok{color:var(--green);}
.mt-summary .num.warn{color:var(--amber);}
.mt-summary .num.due{color:var(--red);}
.mt-summary .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.part-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}
.part-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}
.chevron{color:var(--muted);transition:transform .2s ease;flex:0 0 auto;}
.part-card.expanded .chevron{transform:rotate(180deg);}
.part-name-wrap{display:flex;align-items:center;gap:10px;}
.part-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;
}
.part-name{font-family:'Almarai',sans-serif;font-weight:700;font-size:14.5px;}
.part-ref{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--muted);
  margin-top:2px;
  letter-spacing:.3px;
}
.part-status{
  font-size:11px;
  font-weight:700;
  padding:4px 9px;
  border-radius:999px;
}
.part-status.ok{background:#4FBE8A22;color:var(--green);}
.part-status.warn{background:#E8A33D22;color:var(--amber);}
.part-status.due{background:#E4614F22;color:var(--red);}

.gauge{margin-top:14px;}
.part-details{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.part-card.expanded .part-details{max-height:260px;}
.gauge-track{
  position:relative;
  height:8px;
  border-radius:99px;
  background:var(--surface-2);
  overflow:hidden;
}
.gauge-fill{
  position:absolute;
  top:0;right:0;
  height:100%;
  border-radius:99px;
}
.gauge-ticks{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
.gauge-ticks span{
  width:1px;height:4px;
  background:var(--border);
}
.part-meta{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:11.5px;
  color:var(--muted);
}
.part-meta b{color:var(--text);font-weight:600;}

/* Add part */
.add-part-btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1.5px dashed var(--border);
  background:transparent;
  color:var(--amber);
  font-family:'Almarai',sans-serif;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  margin-bottom:14px;
}
.add-part-btn:active{background:var(--amber-dim);}
.add-panel{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  margin-bottom:14px;
}
.add-panel.open{max-height:600px;}
.add-panel-inner{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}
.mode-toggle{display:flex;gap:8px;margin-bottom:14px;}
.mode-btn{
  flex:1;
  padding:9px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--muted);
  font-size:12.5px;
  font-weight:700;
  font-family:'Tajawal',sans-serif;
  cursor:pointer;
}
.mode-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
.field-label{font-size:11.5px;color:var(--muted);margin-bottom:6px;display:block;}
.field-group{margin-bottom:12px;}
.field-input, .field-select{
  width:100%;
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  font-size:13.5px;
  padding:10px 12px;
  border-radius:10px;
}
.field-input:focus, .field-select:focus{outline:none;border-color:var(--amber);}
.field-row{display:flex;gap:10px;}
.field-row .field-group{flex:1;}
.confirm-btn{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--amber);
  color:#14171C;
  font-family:'Almarai',sans-serif;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  margin-top:4px;
}
.form-hint{font-size:11px;color:var(--muted);margin-top:8px;}

/* Bottom nav */
.bottom-nav{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(50%);
  width:100%;
  max-width:480px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 0;
  color:var(--muted);
  cursor:pointer;
  border-radius:12px;
  transition:.15s ease;
}
.nav-btn.active{color:var(--amber);background:var(--amber-dim);}
.nav-btn span{font-size:12px;font-weight:700;font-family:'Tajawal',sans-serif;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>سياراتي</h1>
    <p>تتبع سياراتك وصيانتها بمكان واحد</p>
  </div>

  <div class="car-switcher">
    <div class="car-select-wrap">
      <select class="car-select" id="carSelect"></select>
    </div>
  </div>

  <div class="content">
    <div class="section active" id="section-car"></div>
    <div class="section" id="section-maintenance"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-btn active" data-tab="car">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 100 4 2 2 0 000-4zm14 0a2 2 0 100 4 2 2 0 000-4zM5 17l1.6-6.4A2 2 0 018.5 9h7a2 2 0 011.9 1.6L19 17M5 17H3v-3l1-1M19 17h2v-3l-1-1M4 13h16"/></svg>
      <span>سيارتي</span>
    </div>
    <div class="nav-btn" data-tab="maintenance">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      <span>صياناتي</span>
    </div>
  </div>

</div>

<script>
const cars = [
  {
    id:1, name:"تويوتا كامري 2022", plate:"أ ب ج 1234",
    color:"أبيض لؤلؤي", vin:"JTNBE46K...", mileage: 45230,
    parts:[
      {name:"زيت المكينة وفلتره", ref:"OIL-0001", icon:"drop", lastDate:"2026-05-10", lastMileage:40230, lifeKm:10000, lifeMonths:6},
      {name:"فلتر الهواء", ref:"AIR-0002", icon:"filter", lastDate:"2026-02-01", lastMileage:35000, lifeKm:20000, lifeMonths:12},
      {name:"الكفرات", ref:"TIRE-0003", icon:"tire", lastDate:"2025-01-15", lastMileage:15000, lifeKm:60000, lifeMonths:36},
      {name:"البطارية", ref:"BAT-0004", icon:"battery", lastDate:"2024-11-01", lastMileage:5000, lifeKm:null, lifeMonths:24},
      {name:"تيل الفرامل", ref:"BRK-0005", icon:"brake", lastDate:"2026-04-01", lastMileage:38500, lifeKm:30000, lifeMonths:18},
      {name:"مويّة الرديتر", ref:"CLNT-0006", icon:"coolant", lastDate:"2025-03-01", lastMileage:20000, lifeKm:null, lifeMonths:24},
    ]
  },
  {
    id:2, name:"هيونداي سوناتا 2020", plate:"د هـ و 5678",
    color:"رمادي", vin:"KMHL14J...", mileage: 78900,
    parts:[
      {name:"زيت المكينة وفلتره", ref:"OIL-0011", icon:"drop", lastDate:"2026-06-20", lastMileage:75000, lifeKm:10000, lifeMonths:6},
      {name:"فلتر الهواء", ref:"AIR-0012", icon:"filter", lastDate:"2025-09-01", lastMileage:60000, lifeKm:20000, lifeMonths:12},
      {name:"الكفرات", ref:"TIRE-0013", icon:"tire", lastDate:"2023-01-01", lastMileage:20000, lifeKm:60000, lifeMonths:36},
      {name:"البطارية", ref:"BAT-0014", icon:"battery", lastDate:"2024-01-01", lastMileage:45000, lifeKm:null, lifeMonths:24},
      {name:"تيل الفرامل", ref:"BRK-0015", icon:"brake", lastDate:"2026-01-10", lastMileage:70000, lifeKm:30000, lifeMonths:18},
      {name:"مويّة الرديتر", ref:"CLNT-0016", icon:"coolant", lastDate:"2024-06-01", lastMileage:50000, lifeKm:null, lifeMonths:24},
    ]
  },
  {
    id:3, name:"لكزس ES 2023", plate:"ز ح ط 9012",
    color:"أسود", vin:"JTHBK1EG...", mileage: 12040,
    parts:[
      {name:"زيت المكينة وفلتره", ref:"OIL-0021", icon:"drop", lastDate:"2026-06-01", lastMileage:10000, lifeKm:10000, lifeMonths:6},
      {name:"فلتر الهواء", ref:"AIR-0022", icon:"filter", lastDate:"2026-01-01", lastMileage:5000, lifeKm:20000, lifeMonths:12},
      {name:"الكفرات", ref:"TIRE-0023", icon:"tire", lastDate:"2025-07-01", lastMileage:2000, lifeKm:60000, lifeMonths:36},
      {name:"البطارية", ref:"BAT-0024", icon:"battery", lastDate:"2025-07-01", lastMileage:2000, lifeKm:null, lifeMonths:24},
      {name:"تيل الفرامل", ref:"BRK-0025", icon:"brake", lastDate:"2026-06-01", lastMileage:10000, lifeKm:30000, lifeMonths:18},
      {name:"مويّة الرديتر", ref:"CLNT-0026", icon:"coolant", lastDate:"2025-07-01", lastMileage:2000, lifeKm:null, lifeMonths:24},
    ]
  },
];

const TODAY = '2026-07-17';

const partsCatalog = [
  {id:'oil', name:'زيت المكينة وفلتره', icon:'drop', lifeKm:9000, lifeMonths:6},
  {id:'air_filter', name:'فلتر الهواء', icon:'filter', lifeKm:18000, lifeMonths:12},
  {id:'cabin_filter', name:'فلتر المكيف', icon:'filter', lifeKm:18000, lifeMonths:9},
  {id:'brake_pads', name:'تيل الفرامل', icon:'brake', lifeKm:55000, lifeMonths:null},
  {id:'tires', name:'الكفرات', icon:'tire', lifeKm:65000, lifeMonths:60},
  {id:'battery', name:'البطارية', icon:'battery', lifeKm:null, lifeMonths:36},
  {id:'spark_plugs', name:'البواجي', icon:'spark', lifeKm:40000, lifeMonths:null},
  {id:'timing_belt', name:'سير الكاتينة (تايمنج)', icon:'belt', lifeKm:120000, lifeMonths:null},
  {id:'timing_chain', name:'جنزير الكاتينة', icon:'belt', lifeKm:180000, lifeMonths:null},
  {id:'coolant', name:'مويّة الرديتر', icon:'coolant', lifeKm:130000, lifeMonths:48},
  {id:'wipers', name:'مساحات', icon:'wiper', lifeKm:null, lifeMonths:9},
  {id:'cv_boot', name:'جلود الكردان', icon:'boot', lifeKm:30000, lifeMonths:null},
  {id:'control_arm', name:'مقصات', icon:'arm', lifeKm:120000, lifeMonths:null},
  {id:'gearbox_oil', name:'زيت الفتيس', icon:'gearbox', lifeKm:75000, lifeMonths:null},
  {id:'brake_fluid', name:'زيت الفرامل', icon:'drop', lifeKm:null, lifeMonths:24},
  {id:'accessory_belt', name:'سير الدينمو/الكمبروسر', icon:'belt', lifeKm:null, lifeMonths:30},
  {id:'wheel_bearing', name:'طقم البلي', icon:'bearing', lifeKm:130000, lifeMonths:null},
];

let activeCarId = cars[0].id;
let activeTab = 'car';
let expandedParts = new Set();
let addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:''};

const icons = {
  drop:'<path d="M12 2s7 8.5 7 13a7 7 0 11-14 0c0-4.5 7-13 7-13z"/>',
  filter:'<path d="M4 4h16l-6 8v6l-4 2v-8L4 4z"/>',
  tire:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.5"/>',
  battery:'<rect x="3" y="8" width="17" height="10" rx="2"/><path d="M20 11v4M7 8V6M11 8V6"/>',
  brake:'<circle cx="12" cy="12" r="8"/><path d="M12 4v4M12 16v4M4 12h4M16 12h4"/>',
  coolant:'<path d="M12 2v6M9 5h6M6 10h12l-1.5 10a2 2 0 01-2 1.7H9.5A2 2 0 017.5 20L6 10z"/>',
  spark:'<path d="M9 2h6v6l-2 2v9a1 1 0 01-2 0v-9l-2-2V2z"/><path d="M9 6h6"/>',
  belt:'<circle cx="8" cy="12" r="3"/><circle cx="16" cy="12" r="3"/><path d="M8 9h8M8 15h8"/>',
  wiper:'<path d="M5 19L17 7M13 5l4 4-3 3"/>',
  boot:'<path d="M6 4v16M18 4v16M6 8h12M6 12h12M6 16h12"/>',
  arm:'<path d="M4 18l6-12h4l6 12M4 18h16"/>',
  gearbox:'<circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>',
  bearing:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>',
  custom:'<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>',
};

function svgIcon(name, color){
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[name]||icons.drop}</svg>`;
}

function daysBetween(d1,d2){ return Math.round((d2-d1)/(1000*60*60*24)); }

function computePercent(part, car){
  const last = new Date(part.lastDate);
  const now = new Date(TODAY);
  let pctKm = null, pctTime = null;
  if(part.lifeKm){
    const usedKm = car.mileage - part.lastMileage;
    pctKm = Math.min(100, Math.max(0,(usedKm/part.lifeKm)*100));
  }
  if(part.lifeMonths){
    const usedDays = daysBetween(last, now);
    const lifeDays = part.lifeMonths*30;
    pctTime = Math.min(100, Math.max(0,(usedDays/lifeDays)*100));
  }
  return Math.round(Math.max(pctKm||0, pctTime||0));
}

function statusFromPct(pct){
  if(pct>=100) return {cls:'due', label:'مستحقة'};
  if(pct>=75) return {cls:'warn', label:'قربت'};
  return {cls:'ok', label:'سليمة'};
}

function fmt(n){ return n.toLocaleString('en-US'); }

function renderSwitcher(){
  const el = document.getElementById('carSelect');
  el.innerHTML = cars.map(c=>`<option value="${c.id}" ${c.id===activeCarId?'selected':''}>${c.name} — ${c.plate}</option>`).join('');
}

function renderCarSection(){
  const car = cars.find(c=>c.id===activeCarId);
  const el = document.getElementById('section-car');
  el.innerHTML = `
    <div class="car-card">
      <div class="car-card-top">
        <div>
          <h2>${car.name}</h2>
          <div class="sub">${car.color} · لوحة ${car.plate}</div>
        </div>
        <div class="icon">${svgIcon('tire','#E8A33D')}</div>
      </div>
      <div class="odometer">
        <span class="label">قراءة العداد الحالية</span>
        <span class="value">${fmt(car.mileage)} كم</span>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="k">رقم الهيكل</div><div class="v">${car.vin}</div></div>
        <div class="info-item"><div class="k">عدد القطع المتابَعة</div><div class="v">${car.parts.length} قطع</div></div>
      </div>
    </div>`;
}

function renderMaintenanceSection(){
  const car = cars.find(c=>c.id===activeCarId);
  const el = document.getElementById('section-maintenance');

  let ok=0,warn=0,due=0;
  const cards = car.parts.map(p=>{
    const pct = computePercent(p, car);
    const st = statusFromPct(pct);
    if(st.cls==='ok') ok++; else if(st.cls==='warn') warn++; else due++;
    const color = st.cls==='ok'?'var(--green)':st.cls==='warn'?'var(--amber)':'var(--red)';
    const remainingKm = p.lifeKm ? Math.max(0, (p.lastMileage+p.lifeKm) - car.mileage) : null;

    return `
    <div class="part-card ${expandedParts.has(p.ref)?'expanded':''}">
      <div class="part-top" onclick="togglePart('${p.ref}')">
        <div class="part-name-wrap">
          <div class="part-icon">${svgIcon(p.icon,'#E8A33D')}</div>
          <div>
            <div class="part-name">${p.name}</div>
            <div class="part-ref">مرجع ${p.ref}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="part-status ${st.cls}">${st.label}</div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <div class="part-details">
        <div class="gauge">
          <div class="gauge-track">
            <div class="gauge-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="gauge-ticks">${Array.from({length:11}).map(()=>'<span></span>').join('')}</div>
        </div>
        <div class="part-meta">
          <span>آخر صيانة: <b>${p.lastDate}</b> عند <b>${fmt(p.lastMileage)}</b> كم</span>
          <span>${remainingKm!==null ? 'متبقي <b>'+fmt(remainingKm)+'</b> كم' : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="mt-summary">
      <div class="box"><div class="num ok">${ok}</div><div class="lbl">سليمة</div></div>
      <div class="box"><div class="num warn">${warn}</div><div class="lbl">قربت</div></div>
      <div class="box"><div class="num due">${due}</div><div class="lbl">مستحقة</div></div>
    </div>
    ${renderAddPart()}
    ${cards}`;
}

function renderAddPart(){
  const catalogOptions = partsCatalog.map(c=>`<option value="${c.id}" ${c.id===addPart.catalogId?'selected':''}>${c.name}</option>`).join('');
  return `
    <button class="add-part-btn" onclick="toggleAddPanel()">${addPart.open ? '✕ إغلاق' : '+ إضافة قطعة للمتابعة'}</button>
    <div class="add-panel ${addPart.open?'open':''}">
      <div class="add-panel-inner">
        <div class="mode-toggle">
          <button class="mode-btn ${addPart.mode==='catalog'?'active':''}" onclick="setAddMode('catalog')">من القائمة</button>
          <button class="mode-btn ${addPart.mode==='custom'?'active':''}" onclick="setAddMode('custom')">قطعة يدوية</button>
        </div>
        ${addPart.mode==='catalog' ? `
        <div class="field-group">
          <label class="field-label">اختر القطعة</label>
          <select class="field-select" onchange="onCatalogChange(this.value)">${catalogOptions}</select>
        </div>` : `
        <div class="field-group">
          <label class="field-label">اسم القطعة</label>
          <input class="field-input" type="text" value="${addPart.name}" oninput="updateAddField('name', this.value)" placeholder="مثال: مقص أمامي يمين">
        </div>`}
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">العمر بالكيلومتر</label>
            <input class="field-input" type="number" value="${addPart.km}" oninput="updateAddField('km', this.value)" placeholder="مثال: 20000">
          </div>
          <div class="field-group">
            <label class="field-label">العمر بالأشهر</label>
            <input class="field-input" type="number" value="${addPart.months}" oninput="updateAddField('months', this.value)" placeholder="مثال: 12">
          </div>
        </div>
        <button class="confirm-btn" onclick="confirmAddPart()">إضافة للسجل</button>
        <div class="form-hint">تعبئة خانة وحدة تكفي، ونقطة البداية هي عداد السيارة الحالي وتاريخ اليوم.</div>
      </div>
    </div>`;
}

function toggleAddPanel(){
  addPart.open = !addPart.open;
  if(addPart.open){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    addPart.mode='catalog'; addPart.name=''; addPart.km=cat.lifeKm||''; addPart.months=cat.lifeMonths||'';
  }
  renderMaintenanceSection();
}

function setAddMode(mode){
  addPart.mode = mode;
  if(mode==='catalog'){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    addPart.km = cat.lifeKm||''; addPart.months = cat.lifeMonths||'';
  } else {
    addPart.km=''; addPart.months='';
  }
  renderMaintenanceSection();
}

function onCatalogChange(id){
  addPart.catalogId = id;
  const cat = partsCatalog.find(c=>c.id===id);
  addPart.km = cat.lifeKm||''; addPart.months = cat.lifeMonths||'';
  renderMaintenanceSection();
}

function updateAddField(field, value){
  addPart[field] = value;
}

function confirmAddPart(){
  const car = cars.find(c=>c.id===activeCarId);
  const lifeKm = Number(addPart.km)||null;
  const lifeMonths = Number(addPart.months)||null;
  if(!lifeKm && !lifeMonths){ alert('لازم تدخل مدة بالكيلومتر أو بالأشهر على الأقل'); return; }

  let name, icon, ref;
  if(addPart.mode==='catalog'){
    const cat = partsCatalog.find(c=>c.id===addPart.catalogId);
    name = cat.name; icon = cat.icon;
    ref = cat.id.toUpperCase()+'-'+Date.now().toString().slice(-4);
  } else {
    name = addPart.name.trim();
    if(!name){ alert('لازم تكتب اسم القطعة'); return; }
    icon = 'custom';
    ref = 'CUST-'+Date.now().toString().slice(-5);
  }

  car.parts.push({name, ref, icon, lastDate:TODAY, lastMileage:car.mileage, lifeKm, lifeMonths});
  addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:''};
  renderMaintenanceSection();
}

function togglePart(ref){
  if(expandedParts.has(ref)) expandedParts.delete(ref); else expandedParts.add(ref);
  renderMaintenanceSection();
}

function selectCar(id){
  activeCarId = id;
  expandedParts = new Set();
  addPart = {open:false, mode:'catalog', catalogId:partsCatalog[0].id, name:'', km:'', months:''};
  renderSwitcher();
  renderCarSection();
  renderMaintenanceSection();
}

function selectTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('section-car').classList.toggle('active', tab==='car');
  document.getElementById('section-maintenance').classList.toggle('active', tab==='maintenance');
}

document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click', ()=>selectTab(b.dataset.tab));
});
document.getElementById('carSelect').addEventListener('change', (e)=>selectCar(Number(e.target.value)));

renderSwitcher();
renderCarSection();
renderMaintenanceSection();
</script>
</body>
</html>
